<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Shadow Clips — The Reluctant Resurrection of Sherlock Holmes</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #16181d;
    color: #e7e9ee;
    line-height: 1.5;
  }
  header {
    padding: 32px 24px 16px;
    border-bottom: 1px solid #2a2e37;
  }
  h1 { margin: 0 0 4px; font-size: 1.4rem; font-weight: 650; }
  header p { margin: 0; color: #9aa0ad; font-size: .92rem; }
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
    gap: 24px;
  }
  .card {
    background: #1d2027;
    border: 1px solid #2a2e37;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .card video {
    width: 100%;
    display: block;
    background: #fff; /* silhouettes are black-on-white */
    aspect-ratio: 16 / 9;
    object-fit: contain;
  }
  .meta { padding: 14px 16px 18px; }
  .meta h2 { margin: 0 0 4px; font-size: 1.05rem; }
  .badge {
    display: inline-block;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .03em;
    text-transform: uppercase;
    color: #11141a;
    background: #cfd3dc;
    border-radius: 999px;
    padding: 2px 9px;
    margin-bottom: 8px;
  }
  .meta .src { color: #7f8694; font-size: .82rem; margin: 6px 0 0; }
  .meta .notes { color: #b6bcc8; font-size: .9rem; margin: 8px 0 0; }
  footer { color: #6b7280; font-size: .8rem; text-align: center; padding: 20px; }
  .empty { color: #9aa0ad; padding: 24px; }
</style>
</head>
<body>
<header>
  <h1>Shadow Clips</h1>
  <p><em>The Reluctant Resurrection of Sherlock Holmes</em> — shadow-projection silhouettes</p>
</header>
<main id="gallery"><p class="empty">Loading clips…</p></main>
<footer>Silhouettes rendered for community-theater scrim projection. Black-on-white = cast shadow.</footer>

<script>
fetch('clips.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(clips => {
    const g = document.getElementById('gallery');
    if (!Array.isArray(clips) || clips.length === 0) {
      g.innerHTML = '<p class="empty">No clips published yet.</p>';
      return;
    }
    g.innerHTML = '';
    for (const c of clips) {
      const card = document.createElement('div');
      card.className = 'card';
      const poster = c.poster ? ` poster="${c.poster}"` : '';
      card.innerHTML = `
        <video controls preload="metadata"${poster}>
          <source src="${c.file}" type="video/mp4">
          Your browser can’t play this video. <a href="${c.file}">Download it</a>.
        </video>
        <div class="meta">
          ${c.page ? `<span class="badge">Page ${c.page}</span>` : ''}
          <h2>${c.title ?? c.file}</h2>
          ${c.source ? `<p class="src">Source: ${c.source}</p>` : ''}
          ${c.notes ? `<p class="notes">${c.notes}</p>` : ''}
        </div>`;
      g.appendChild(card);
    }
  })
  .catch(err => {
    document.getElementById('gallery').innerHTML =
      '<p class="empty">Could not load clips.json — ' + err + '</p>';
  });
</script>
</body>
</html>
